services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_prisma
    restart: always
    environment:
      POSTGRES_USER: prisma
      POSTGRES_PASSWORD: prisma123
      POSTGRES_DB: appdb
    ports:
      - "5433:5432" # Mantém a 5433 mapeada para acesso externo (DBeaver/Beekeeper)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prisma -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: api_app
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # A conexão interna usa o nome do serviço 'postgres' e a porta 5432
      DATABASE_URL: "postgresql://prisma:prisma123@postgres:5432/appdb"
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "3000:3000"

  studio:
    build: .
    container_name: prisma_studio
    command: npx prisma studio --port 5555 --browser none
    environment:
      # Prisma Studio também se conecta internamente pela rede do Docker
      DATABASE_URL: "postgresql://prisma:prisma123@postgres:5432/appdb"
    ports:
      - "5555:5555"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

