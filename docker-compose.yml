services:
  postgres:
    image: postgres:16
    container_name: postgres_prisma
    restart: always
    environment:
      POSTGRES_USER: prisma
      POSTGRES_PASSWORD: prisma123
      POSTGRES_DB: appdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: api_app
    restart: on-failure
    depends_on:
      - postgres
    environment:
      DATABASE_URL: "postgresql://prisma:prisma123@postgres:5432/appdb"
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "3000:3000"

  studio:
    build: .
    container_name: prisma_studio
    command: npx prisma studio --port 5555 --browser none
    environment:
      DATABASE_URL: "postgresql://prisma:prisma123@postgres:5432/appdb"
    ports:
      - "5555:5555"
    depends_on:
      - postgres

volumes:
  postgres_data:
